<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Bristol</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- =========================
     HEADER
========================= -->

<header class="site-header">

    <div class="header-left">

        <!-- LOGO -->
        <img src="http://cinemabristol.it/inproiezione_file/image2901.jpg" alt="Cinema Logo" class="logo">

        <div class="cinema-details">

            <h1>Cinema Bristol</h1>

            <div class="cinema-info">
                Via G. Tavoni, 952, Savignano sul Panaro (MO) - Fraz. Formica - Ponte di Vignola<br>
                Segreteria automatica 059775510<br>
                Prenotazioni (Whatsapp) +39 3806352988
            </div>


        </div>
    </div>

    <nav class="header-nav">
        <a href="prezzi.html">Prezzi</a>
        <a href="contatti.html">Contatti</a>
    </nav>

</header>

<!-- =========================
     MAIN
========================= -->

<main>

                <div class="week-range">
                Programmazione settimanale
            </div>

    <div class="page" id="movies">
    <div class="loading">Caricamento programmazione...</div>

</main>

<!-- =========================
     FOOTER
========================= -->

<footer>
    © Cinema Bristol
</footer>

<!-- =========================
     SCRIPT
========================= -->

<script>

async function loadMovies() {
    const res = await fetch("/scraper/movies.enriched.json");
    const movies = await res.json();

    const container = document.getElementById("movies");

    container.innerHTML = movies.map(movie => `
        <div class="card">
            <div class="poster">
                <img src="${movie.poster}" alt="${movie.title}">
            </div>

            <div class="info">
                <div class="title">${movie.title}</div>
                <div class="director">di ${movie.director}</div>

                <div class="ratings">
                    ${movie.imdbRating ? `<span class="badge imdb">IMDb: ${movie.imdbRating}</span>` : ""}
                    ${movie.rottenTomatoes ? `<span class="badge rt">RT: ${movie.rottenTomatoes}</span>` : ""}
                    ${movie.wikipedia ? `<a class="wiki-link" href="${movie.wikipedia}" target="_blank" rel="noopener">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
                        Wikipedia
                    </a>` : ""}
                </div>

                <div class="schedule">
                    ${renderSchedule(movie.schedule)}
                </div>
            </div>
        </div>
    `).join("");
}

function renderSchedule(schedule) {
    const order = ["Dom", "Lun.", "Mar.", "Mer.", "Gio.", "Ven.", "Sab."];

    return order.map(day => `
        <div class="day">
            <div class="day-name">${day}</div>
            ${(schedule[day] || []).map(t => `<span class="time">${t}</span>`).join("")}
        </div>
    `).join("");
}

loadMovies();

</script>

</body>
</html>
