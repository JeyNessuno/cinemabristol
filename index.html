<body>

<!-- =========================
     MAIN
========================= -->

<main>

                <div class="week-range">
                Programmazione settimanale
            </div>

</main>

<!-- =========================
     FOOTER
========================= -->

<footer>
    © Cinema Bristol
</footer>

<!-- =========================
     SCRIPT
========================= -->

<script>

// Auto-hide header on scroll
const header = document.querySelector(".site-header");
const main = document.querySelector("main");
let lastScroll = 0;
const SCROLL_THRESHOLD = 80;

function setMainPadding() {
    main.style.paddingTop = (header.offsetHeight + 20) + "px";
}

setMainPadding();
window.addEventListener("resize", setMainPadding);

window.addEventListener("scroll", () => {
    const currentScroll = window.pageYOffset;
    if (Math.abs(currentScroll - lastScroll) < 10) return;

    if (currentScroll > SCROLL_THRESHOLD && currentScroll > lastScroll) {
        header.classList.add("hidden");
    } else if (currentScroll < lastScroll) {
        header.classList.remove("hidden");
    }
    lastScroll = currentScroll;
});

async function loadMovies() {
    const res = await fetch("movies.enriched.json");
    const movies = await res.json();

    const container = document.getElementById("movies");

    container.innerHTML = movies.map(movie => `
        <div class="card">
            <div class="poster">
                <img src="${movie.poster}" alt="${movie.title}">
            </div>

            <div class="info">
                <div class="title">${movie.title}</div>
                <div class="director">di ${movie.director}</div>

                <div class="ratings">
                    ${movie.imdbRating ? `<span class="badge imdb">IMDb: ${movie.imdbRating}</span>` : ""}
                    ${movie.rottenTomatoes ? `<span class="badge rt">RT: ${movie.rottenTomatoes}</span>` : ""}
                    ${movie.wikipedia ? `<a class="wiki-link" href="${movie.wikipedia}" target="_blank" rel="noopener">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
                        Wikipedia
                    </a>` : ""}
                </div>

                <div class="schedule">
                    ${renderSchedule(movie.schedule)}
                </div>
            </div>
        </div>
    `).join("");
}

function renderSchedule(schedule) {
    const order = ["Gio.", "Ven.", "Sab.", "Dom", "Lun.", "Mar.", "Mer."];
    return order.map(day => `
        <div class="day">
            <div class="day-name">${day}</div>
            ${(schedule[day] || []).map(t => `<span class="time">${t}</span>`).join("")}
        </div>
    `).join("");
}



loadMovies().then(() => highlightToday());

function highlightToday() {
    const giorni = ["Dom", "Lun.", "Mar.", "Mer.", "Gio.", "Ven.", "Sab."];
    const today = giorni[new Date().getDay()];
    document.querySelectorAll(".day-name").forEach(el => {
        if (el.textContent.trim() === today) {
            el.closest(".day").classList.add("today");
        }
    });
}



</script>

</body>
</html>
