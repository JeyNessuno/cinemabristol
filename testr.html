<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cinema</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

.page {
    max-width: 1200px;
    margin: auto;
}

.card {
    display: flex;
    gap: 16px;
    padding: 16px;
    border-bottom: 1px solid #333;
}

.poster {
    flex: 0 0 160px;
}

.poster img {
    width: 160px;
    display: block;
    border-radius: 8px;
}

.sheet-container {
    flex: 1;
    overflow-x: auto;
}

.sheet {
    min-width: 650px;
}

.title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 6px;
}

.actors {
    opacity: .8;
    font-size: 14px;
    margin-bottom: 12px;
}

table {
    border-collapse: collapse;
    width: 100%;
}

th,
td {
    border: 1px solid #333;
    padding: 8px;
    text-align: center;
    white-space: nowrap;
}

th {
    background: #1c1c1c;
}

.loading {
    padding: 30px;
}

@media (max-width: 700px) {

    .card {
        gap: 12px;
    }

    .poster {
        flex: 0 0 120px;
    }

    .poster img {
        width: 120px;
    }
}
</style>
</head>

<body>

<div class="page" id="movies">
    <div class="loading">Loading...</div>
</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQKq7qfwbh7LPr3dCfRm6ttHM6KQVkb7MKBWJIsoL1qVNC8kH_BmR8DGDA9r9MQX_4rGGhzfc_YlXTS/pub?output=csv";

const DAYS = [
    ["wed","Wed"],
    ["thu","Thu"],
    ["fri","Fri"],
    ["sat","Sat"],
    ["sun","Sun"],
    ["mon","Mon"],
    ["tue","Tue"]
];

function parseCSV(text) {

    const rows = text.trim().split("\n");

    const headers = rows[0]
        .split(",")
        .map(h => h.trim());

    return rows.slice(1).map(row => {

        const values = row.split(",");

        const obj = {};

        headers.forEach((header, index) => {
            obj[header] = values[index]?.trim() || "";
        });

        return obj;

    });

}

function createMovieCard(movie) {

    const visibleDays = DAYS.filter(
        ([key]) => movie[key]
    );

    const headers = visibleDays
        .map(day => `<th>${day[1]}</th>`)
        .join("");

    const times = visibleDays
        .map(day => `<td>${movie[day[0]]}</td>`)
        .join("");

    return `
    <div class="card">

        <div class="poster">
            <img src="${movie.poster}" alt="">
        </div>

        <div class="sheet-container">

            <div class="sheet">

                <div class="title">
                    ${movie.title}
                </div>

                <div class="actors">
                    ${movie.actors || ""}
                </div>

                <table>
                    <tr>
                        ${headers}
                    </tr>
                    <tr>
                        ${times}
                    </tr>
                </table>

            </div>

        </div>

    </div>
    `;
}

async function loadMovies() {

    const response = await fetch(CSV_URL);

    const csv = await response.text();

    const movies = parseCSV(csv)
        .filter(movie => movie.movie_id);

    document.getElementById("movies").innerHTML =
        movies.map(createMovieCard).join("");
}

loadMovies();

</script>

</body>
</html>
