name: Update Movies

env:
          GCP_API_KEY: ${{ secrets.GCP_API_KEY }}

on:
  schedule:
    - cron: "0 4 * * 4"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm install

      - run: node scraper/scraper3.js > scraper/movies.json

      - run: node scraper/enrich.js

      - run: mv scraper/movies.enriched.json movies.enriched.json


      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add scraper/movies.json movies.enriched.json *.png *.jpg

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "update movies data"
          git push